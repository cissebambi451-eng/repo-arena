services:
  postgres:
    image: postgres:16-alpine
    container_name: sandbox-dev-postgres-dev
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - node_postgres_data_dev:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: dev
    container_name: sandbox-dev-backend-dev
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://app:app@postgres:5432/appdb
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: sandbox-dev-frontend-dev
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  node_postgres_data_dev:
